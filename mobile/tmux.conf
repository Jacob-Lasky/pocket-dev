# pocket-dev tmux config (loaded via `tmux -f`)
#
# There are TWO independent layers of "alternate screen" to think about, and
# we want to disable only ONE of them:
#
#   1. OUTER alt-screen: tmux switching the visible buffer it shows to xterm.js
#      when a session attaches. tmux does this by default (it sends `\x1b[?1049h`
#      / smcup on attach). Result: every byte of session output lands in
#      xterm.js's alt-buffer, which has no scrollback. We DISABLE this so the
#      main buffer accumulates a continuous scrollback that View mode can read.
#
#   2. INNER alt-screen: applications running INSIDE tmux (Claude Code's TUI,
#      vim, less, htop) using alt-screen for their full-screen UI. We need
#      this ENABLED — Claude Code renders its prompt input area inside an
#      alt-screen TUI, and disabling it breaks input handling entirely.
#
# An earlier version of this file disabled both. CI passed (tests use `cat`,
# which doesn't use alt-screen) but Claude's input was broken in production.
# This version targets only the outer layer.

# Layer 1: strip smcup/rmcup from the OUTER terminal's terminfo so tmux
# can't switch xterm.js into alt-buffer at attach. All output stays in the
# main buffer, where xterm.js scrollback works normally and View mode's
# serialize({ excludeAltBuffer: true }) can read history.
set -ga terminal-overrides ',xterm*:smcup@:rmcup@'

# Forwards browser tab focus-in/focus-out events into the inner app so
# Claude can refresh stale UI state when you switch tabs back.
set -g focus-events on

# Everything below was previously written into ~/.tmux.conf by start.sh.
# Now that server.js spawns tmux with `-f /mobile/tmux.conf` (which REPLACES
# the default ~/.tmux.conf search), those user-level settings have to live
# here too — otherwise the spawned client comes up with tmux defaults.
#
# Specifically:
# - `status off`: removes tmux's bottom status bar. With it on, tmux paints
#   its bar over the bottom row and redraws periodically; the redraws
#   interact poorly with xterm.js selection state and broke the
#   `drag-selecting auto-copies` e2e test in CI by shifting the buffer out
#   from under term.getSelection().
# - `mouse off` is the default and we keep it that way: per-session tabs
#   handle window switching client-side now, so tmux doesn't need mouse
#   capture, and *disabling* mouse mode is what lets xterm.js's native
#   touch scroll work on mobile without tmux eating the events.
set -g history-limit 100000
set -g status off
set -g escape-time 0
