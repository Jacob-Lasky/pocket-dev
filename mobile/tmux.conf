# pocket-dev tmux config (loaded via `tmux -f`)

# alternate-screen off — controls what INNER applications running inside tmux
# (vim, less, htop, Claude's TUI) may do. With this off, those apps can't
# enter alt-screen and their output stays in the main scrollback.
setw -g alternate-screen off

# terminal-overrides smcup@:rmcup@ — controls what tmux ITSELF does with the
# OUTER terminal (xterm.js in our case). By default tmux enters alt-screen
# (\x1b[?1049h / smcup) when the session attaches, so the entire visible
# output lives in xterm.js's alt-buffer. That's invisible to our View
# renderer (which uses serialize({ excludeAltBuffer: true })) and creates
# the "duplicated chunks" the user originally reported. Stripping smcup and
# rmcup from the outer terminfo prevents tmux from switching buffers at all.
set -ga terminal-overrides ',xterm*:smcup@:rmcup@'

# focus-events on — forwards browser tab focus-in/focus-out into the inner
# app (Claude Code) so it can refresh stale UI state.
set -g focus-events on
